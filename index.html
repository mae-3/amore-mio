<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anna & Maik | Hochzeit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. NAVIGATION -->
    <header class="navbar">
        <nav class="nav-links">
            <a href="#hochzeit">Hochzeit</a>
            <a href="#standort">Standort</a>
            <a href="#location">Location</a>
            <!-- Nur am Desktop sichtbar -->
            <a href="rsvp.html" class="btn-rsvp desktop-only">RSVP</a>
        </nav>
    </header>

    <!-- 2. HERO -->
    <section class="hero">
        <div class="hero-content">
            <h1>Anna & Maik</h1>
            <p class="date">31. Juli 2026 · Baden-Baden</p>
        </div>
    </section>

    <!-- 3. COUNTDOWN & RSVP -->
    <section id="countdown-section">
        <div class="countdown-grid">
            <div class="timer-box"><span id="days" class="number"></span><span class="label">TAGE</span></div>
            <div class="timer-box"><span id="hours" class="number"></span><span class="label">STUNDEN</span></div>
            <div class="timer-box"><span id="minutes" class="number"></span><span class="label">MINUTEN</span></div>
            <div class="timer-box"><span id="seconds" class="number"></span><span class="label">SEKUNDEN</span></div>
        </div>
        
        <!-- Zentrale Anmeldung -->
        <div class="cta-container">
            <a href="rsvp.html" class="btn-hero">Jetzt zur Anmeldung</a>
        </div>
    </section>

    <!-- 4. INHALTSBEREICHE -->
    <section id="hochzeit" class="content-section">
        <h2>Hochzeit</h2>
        <p>Inhalt zur Hochzeit...</p>
    </section>

    <section id="standort" class="content-section">
        <h2>Standort</h2>
        <p>Inhalt zum Standort...</p>
    </section>

    <section id="location" class="content-section">
        <h2>Location</h2>
        <p>Inhalt zur Location...</p>
    </section>

    <!-- SKRIPTE -->
    <script>
        const weddingDate = new Date("Dec 19, 2026 17:00:00").getTime();
        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            document.getElementById("days").innerHTML = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerHTML = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerHTML = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerHTML = Math.floor((distance % (1000 * 60)) / 1000);

            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("countdown-section").innerHTML = "Wir feiern!";
            }
        }, 1000);

        window.addEventListener('scroll', function() {
            document.querySelector('.navbar').classList.toggle('scrolled', window.scrollY > 50);
        });
    </script>

</body>
</html>
