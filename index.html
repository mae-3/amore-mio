<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna & Maik | Hochzeit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. NAVIGATION -->
    <header class="navbar">
        <div class="nav-spacer"></div>
        <nav class="nav-links">
            <a href="#hochzeit">Hochzeit</a>
            <a href="#standort">Standort</a>
            <a href="#location">Location</a>
        </nav>
        <div class="nav-right">
            <a href="rsvp.html" class="btn-rsvp">RSVP</a>
        </div>
    </header>

    <!-- 2. HERO (Das Bild muss hier sein!) -->
    <section class="hero">
        <div class="hero-content">
            <h1>Anna & Maik</h1>
            <p class="date">31. Juli 2026 · Baden-Baden</p>
            <a href="rsvp.html" class="btn-hero">RSVP</a>
            
        <!-- Countdown Container -->
        <div id="countdown">
            <span id="days"></span> Tage
            <span id="hours"></span> Std
            <span id="minutes"></span> Min
            <span id="seconds"></span> Sek
        </div>
    </section>

    <!-- 3. INHALTSBEREICHE -->
    <section id="hochzeit" class="content-section">
        <h2>Hochzeit</h2>
        <p>Inhalt zur Hochzeit...</p>
    </section>

    <section id="standort" class="content-section">
        <h2>Standort</h2>
        <p>Inhalt zum Standort...</p>
    </section>

    <section id="location" class="content-section">
        <h2>Location</h2>
        <p>Inhalt zur Location...</p>
    </section>

<script>
    const weddingDate = new Date("Dec 19, 2026 17:00:00").getTime();

    const timer = setInterval(function() {
        const now = new Date().getTime();
        const distance = weddingDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("days").innerHTML = days;
        document.getElementById("hours").innerHTML = hours;
        document.getElementById("minutes").innerHTML = minutes;
        document.getElementById("seconds").innerHTML = seconds;

        if (distance < 0) {
            clearInterval(timer);
            document.getElementById("countdown").innerHTML = "Wir feiern!";
        }
    }, 1000);
</script>
    
</body>
</html>
