<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna & Maik</title>
    <!-- Einbinden einer eleganteren Schriftart -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar" id="navbar">
        <div class="logo">Amore Mio</div>
        <nav class="desktop-nav">
            <a href="#about">Wir</a>
            <a href="#ablauf">Ablauf</a>
            <a href="#anreise">Anreise</a>
            <a href="#faq">FAQ</a>
            <a href="rsvp.html" class="btn-nav">RSVP</a>
        </nav>
        <div class="burger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    </header>

    <div class="nav-overlay" id="navOverlay">
        <button class="close-btn" onclick="toggleMenu()">×</button>
        <a href="#about" onclick="toggleMenu()">Wir</a>
        <a href="#ablauf" onclick="toggleMenu()">Ablauf</a>
        <a href="#anreise" onclick="toggleMenu()">Anreise</a>
        <a href="#faq" onclick="toggleMenu()">FAQ</a>
        <a href="rsvp.html" onclick="toggleMenu()">RSVP</a>
    </div>

    <section class="hero">
        <div class="hero-content">
            <h1>Anna & Maik</h1>
            <p class="date">19. Dezember 2026 · Baden-Baden</p>
        </div>
    </section>

    <section id="countdown-section">
        <div class="countdown-grid">
            <div class="timer-box"><span id="days" class="number"></span><span class="label">TAGE</span></div>
            <div class="timer-box"><span id="hours" class="number"></span><span class="label">STUNDEN</span></div>
            <div class="timer-box"><span id="minutes" class="number"></span><span class="label">MINUTEN</span></div>
            <div class="timer-box"><span id="seconds" class="number"></span><span class="label">SEKUNDEN</span></div>
        </div>
    </section>

    <!-- Inhalt ... -->

    <script>
        function toggleMenu() { document.getElementById('navOverlay').classList.toggle('active'); }
        const weddingDate = new Date("Dec 19, 2026 17:00:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const distance = weddingDate - now;
            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000);
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
